name: Bug report
description: Report a reproducible issue in Kenya Land Trust
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please include enough detail for reproducibility.
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: Concise bug summary
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact navigation, role, and test data
      placeholder: |
        1. Login as...
        2. Navigate to...
        3. Click...
        4. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: role
    attributes:
      label: Affected role
      options:
        - BUYER
        - SELLER
        - ADMIN
        - Multiple roles
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Redact sensitive data before posting
